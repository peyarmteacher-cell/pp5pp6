<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบวัดผล ปพ.5/ปพ.6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #64748b; text-align: center; flex-direction: column;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
        กำลังโหลดระบบ... กรุณารอสักครู่
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.innerHTML = '<div style="color: #ef4444; padding: 20px; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 12px; max-width: 90%; margin: 0 auto;">' +
            '<h3 style="margin-top: 0;">เกิดข้อผิดพลาดในการโหลดระบบ</h3>' +
            '<p style="font-size: 14px; margin-bottom: 10px;">' + msg + '</p>' +
            '<div style="font-size: 12px; color: #991b1b; opacity: 0.7;">' + url + ':' + line + '</div>' +
            '<button onclick="location.reload()" style="margin-top: 15px; padding: 8px 16px; bg: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer;">ลองใหม่อีกครั้ง</button>' +
            '</div>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
